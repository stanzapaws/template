name: Bug Report
description: Report a bug in the project
title: "Bug: "

body:
  - type: input
    id: version
    attributes:
      label: Version
      description: What version of the software are you using?
    validations:
      required: true
  - type: input
    id: environment
    attributes:
      label: Environment
      description: What environment are you running the software in (e.g., operating system, browser, etc.)?
    validations:
      required: false
  - type: textarea
    id: description
    attributes:
      label: Description
      description: Describe the bug in detail, including any relevant information.
    validations:
      required: true
  - type: textarea
    id: expected_behavior
    attributes:
      label: Expected Behavior
      description: What did you expect to happen when you encountered the bug?
    validations:
      required: false
  - type: textarea
    id: steps
    attributes:
      label: Steps to Reproduce
      placeholder: 1. Go to...
    validations:
      required: true
